# =============================================================================
# Kitty Configuration
# Replaces tmux multiplexing with native kitty splits/tabs
# Prefix key: Ctrl+A (mirrors tmux/ghostty setup)
# =============================================================================

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
include bamboo.conf

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------
font_family      Iosevka NFM
bold_font        Iosevka NFM Bold
italic_font      Iosevka NFM SemiBold Italic
bold_italic_font Iosevka NFM Bold Italic
font_size        15

# Nerd Font symbol map (if symbols don't render, this ensures the NF range is covered)
# symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b5,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# -----------------------------------------------------------------------------
# Window Appearance
# -----------------------------------------------------------------------------
background_opacity         0.95
background_blur            64
window_padding_width       5
hide_window_decorations    titlebar-only
confirm_os_window_close    0

# Cursor
cursor_shape               beam
cursor_blink_interval      0.5
cursor_stop_blinking_after 15

# Mouse
mouse_hide_wait            3.0

# Bell
enable_audio_bell          no
visual_bell_duration       0
bell_on_tab                " "
window_alert_on_bell       yes

# -----------------------------------------------------------------------------
# macOS-specific
# -----------------------------------------------------------------------------
macos_option_as_alt        yes
macos_quit_when_last_window_closed yes
macos_titlebar_color       background
macos_colorspace           displayp3

# -----------------------------------------------------------------------------
# Tabs (top bar, like tmux status-position top)
# -----------------------------------------------------------------------------
tab_bar_edge               top
tab_bar_style              powerline
tab_powerline_style        round
tab_bar_min_tabs           2
tab_title_template         " {index}: {title} "
active_tab_title_template  " {index}: {title} "

# Tab colors are set in bamboo.conf

# -----------------------------------------------------------------------------
# Splits / Layouts
# -----------------------------------------------------------------------------
enabled_layouts            splits,stack

# Active window indicator
active_border_color        #aaaaff
inactive_border_color      #5b5e5a
window_border_width        2pt
inactive_text_alpha        0.45

# Inherit working directory for splits
cwd                        current

# Index starts at 1 (like tmux base-index)
# Kitty tabs are 1-indexed by default in the display

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines           10000

# -----------------------------------------------------------------------------
# Clipboard
# -----------------------------------------------------------------------------
copy_on_select             clipboard
clipboard_control          write-clipboard write-primary read-clipboard read-primary

# Allow other programs to control kitty (needed for smart-splits.nvim kitten)
allow_remote_control       yes
listen_on                  unix:/tmp/kitty

# -----------------------------------------------------------------------------
# Keybindings -- Ctrl+A prefix mode (mimics tmux)
# -----------------------------------------------------------------------------

# Clear all default shortcuts to start clean, then add back what we need
# clear_all_shortcuts yes

# -- Ctrl+A activates "tmux" mode (prefix mode)
map ctrl+a>s       launch --location=hsplit --cwd=current
map ctrl+a>v       launch --location=vsplit --cwd=current

# -- Navigate splits via smart-splits kitten (seamless neovim integration)
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right

# Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+l

# -- Resize splits (prefix + Ctrl+hjkl)
map ctrl+a>ctrl+h  resize_window narrower  3
map ctrl+a>ctrl+j  resize_window shorter   3
map ctrl+a>ctrl+k  resize_window taller    3
map ctrl+a>ctrl+l  resize_window wider     3

# -- Tabs
map ctrl+a>ctrl+c  launch --type=tab --cwd=~
map ctrl+a>shift+h previous_tab
map ctrl+a>shift+l next_tab
map ctrl+a>1       goto_tab 1
map ctrl+a>2       goto_tab 2
map ctrl+a>3       goto_tab 3
map ctrl+a>4       goto_tab 4
map ctrl+a>5       goto_tab 5
map ctrl+a>6       goto_tab 6
map ctrl+a>7       goto_tab 7
map ctrl+a>8       goto_tab 8
map ctrl+a>9       goto_tab 9

# -- Pane management
map ctrl+a>z       toggle_layout stack
map ctrl+a>x       close_window
map ctrl+a>ctrl+a  send_key ctrl+a

# -- Rename tab
map ctrl+a>r       set_tab_title

# -- Reload config
map ctrl+a>shift+r load_config_file

# -- Scrollback
map ctrl+a>[       show_scrollback

# -- Standard macOS shortcuts (keep these working)
map cmd+c          copy_to_clipboard
map cmd+v          paste_from_clipboard
map cmd+q          quit
map cmd+n          new_os_window
map cmd+w          close_window
map cmd+t          launch --type=tab --cwd=~
map cmd+equal      change_font_size all +1.0
map cmd+minus      change_font_size all -1.0
map cmd+0          change_font_size all 0
